version: '3.8'

services:
  # Database Service
  mongodb:
    image: mongo:6.0
    container_name: chainmind-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Express Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: ../deployment/docker/Dockerfile.backend
    container_name: chainmind-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/chainmind
      - FRONTEND_URL=http://localhost:3000
      - GROQ_API_KEY=gsk_val_placeholder
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb

  # Next.js Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deployment/docker/Dockerfile.frontend
    container_name: chainmind-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongodb_data:
